<html>
<head><meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  body, html {
    margin: 0;
    padding: 0;
    background: #F6F5EF;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  /* Outer page wrapper */
  #page-wrapper {
    background: #F6F5EF;
    width: 1200px;
    margin: 0 auto;
    padding: 8px 24px 32px 24px;
    box-sizing: border-box;
    position: relative;
  }

  /* Two-column layout: left panel + chart */
  #main-row {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 0;
  }

  /* Left panel: title, legend, detail card */
  #left-panel {
    width: 340px;
    flex-shrink: 0;
    padding: 0 24px 0 0;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  /* Chart container (holds Plotly + gradient overlay) */
  #chart-container {
    position: relative;
    width: 900px;
    height: 800px;
    flex-shrink: 0;
  }

  /* Plotly div fills the container, above the gradient */
  .plotly-graph-div {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 900px !important;
    height: 800px !important;
    z-index: 3;
    cursor: default !important;
  }
  /* Pointer cursor when hovering a dot */
  .plotly-graph-div.hovering-dot {
    cursor: pointer !important;
  }

  /* Custom legend panel */
  #custom-legend {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 12px;
    color: #333;
    margin-top: 20px;
    display: block;
    width: 100%;
  }
  .year-line-wrap {
    margin-bottom: 2px;
    display: flex;
    justify-content: flex-end;
  }
  .year-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #777;
    width: 72px;
    margin-bottom: 8px;
    margin-top: 2px;
    margin-left: auto;
  }
  .legend-party-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 5px;
  }
  .legend-party-row:last-child {
    margin-bottom: 0;
  }
  .party-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .party-label {
    font-size: 11.5px;
    color: #222;
  }

  /* Detail card */
  #detail-panel {
    margin-top: 0;
    margin-bottom: 20px;
    width: 100%;
  }
  #detail-card {
    background: #fff;
    border-radius: 10px;
    padding: 16px 20px 20px 20px;
    box-sizing: border-box;
    width: 100%;
    min-height: 280px;
    display: flex;
    flex-direction: column;
  }
  #detail-card.empty .detail-content { display: none; }
  #detail-card.empty .detail-empty   { display: flex; align-items: center; justify-content: center; flex: 1; color: #ccc; font-size: 11px; }
  #detail-card.filled .detail-content { display: block; }
  #detail-card.filled .detail-empty   { display: none; }

  .detail-empty {
    font-size: 11px;
    color: #bbb;
    line-height: 1.6;
    margin: 0;
    text-align: center;
    flex-direction: column;
  }

  .detail-riding {
    font-size: 16px;
    font-weight: 700;
    color: #111;
    line-height: 1.2;
    margin-bottom: 3px;
  }
  .detail-province {
    font-size: 12px;
    color: #888;
    margin-bottom: 10px;
    font-weight: 400;
  }
  .detail-winner-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }

  /* Two-column header for bar section */
  .detail-col-headers {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }
  .detail-col-header-left {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #aaa;
    /* matches: label(32) + gap(8) + track(flex) + gap(8) + pct(42) = left col */
    flex: 1;
    /* shift to align under bar area: skip the 32px label + 8px gap */
    padding-left: 40px;
  }
  .detail-col-header-right {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #aaa;
    width: 56px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Bar rows */
  .detail-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .detail-bar-row:last-child { margin-bottom: 0; }
  .detail-bar-label {
    font-size: 11px;
    font-weight: 600;
    width: 32px;
    flex-shrink: 0;
    text-align: right;
  }
  .detail-bar-track {
    flex: 1;
    height: 8px;
    background: rgba(0,0,0,0.07);
    border-radius: 4px;
    overflow: hidden;
  }
  .detail-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.25s ease;
  }
  .detail-bar-pct {
    font-size: 12px;
    font-weight: 600;
    color: #222;
    width: 42px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .detail-change-val {
    font-size: 11px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    width: 56px;
    text-align: right;
    flex-shrink: 0;
  }
  .detail-change-val.pos { color: #2a8a2a; }
  .detail-change-val.neg { color: #c0392b; }
  .detail-change-val.neu { color: #aaa; }

  /* ── Riding search (inside card, at top) ── */
  #search-panel {
    margin-bottom: 14px;
    width: 100%;
    position: relative;
  }
  #search-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  #search-icon {
    position: absolute;
    left: 10px;
    color: #bbb;
    pointer-events: none;
    display: flex;
    align-items: center;
  }
  #search-input {
    width: 100%;
    box-sizing: border-box;
    padding: 9px 32px 9px 34px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    color: #111;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: rgba(0,0,0,0.30); }
  #search-input::placeholder { color: #bbb; }
  #search-clear {
    position: absolute;
    right: 8px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #aaa;
    line-height: 1;
    padding: 0 2px;
    display: none;
  }
  #search-clear:hover { color: #555; }
  #search-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px;
    margin: 0;
    padding: 4px 0;
    list-style: none;
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  #search-dropdown li {
    padding: 8px 12px;
    font-size: 12.5px;
    color: #222;
    cursor: pointer;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  #search-dropdown li:hover,
  #search-dropdown li.active { background: #F6F5EF; }
  .search-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Hide Plotly tooltip and modebar */
  .modebar-container { display: none !important; }
  .hoverlayer { display: none !important; }
</style>

</head>

<script>
(function() {
  function alignGradient() {
    var bgPath = document.querySelector('.ternary path');
    if (!bgPath) { setTimeout(alignGradient, 100); return; }
    var bbox = bgPath.getBoundingClientRect();
    var cr   = document.getElementById('chart-container').getBoundingClientRect();
    var left = bbox.left - cr.left, right = bbox.right - cr.left;
    var top  = bbox.top  - cr.top,  bottom = bbox.bottom - cr.top;
    var midX = (left + right) / 2;
    var pts  = midX+','+top+' '+left+','+bottom+' '+right+','+bottom;
    var svg  = document.getElementById('gradient-overlay');

    // Update clip + fill polygons
    svg.querySelector('#tri-clip polygon').setAttribute('points', pts);
    svg.querySelectorAll('polygon')[1].setAttribute('points', pts);

    // Update gradient focal points
    var gLib = svg.querySelector('#g-lib'), gCon = svg.querySelector('#g-con'), gTp = svg.querySelector('#g-tp');
    if (gLib) { gLib.setAttribute('cx', left);  gLib.setAttribute('cy', bottom); gLib.setAttribute('fx', left);  gLib.setAttribute('fy', bottom); }
    if (gCon) { gCon.setAttribute('cx', right); gCon.setAttribute('cy', bottom); gCon.setAttribute('fx', right); gCon.setAttribute('fy', bottom); }
    if (gTp)  { gTp.setAttribute('cx',  midX);  gTp.setAttribute('cy',  top);    gTp.setAttribute('fx',  midX);  gTp.setAttribute('fy',  top); }

    // ── Custom axis labels ──
    // Remove any previously injected labels
    svg.querySelectorAll('.axis-label').forEach(function(el) { el.remove(); });

    var ns = 'http://www.w3.org/2000/svg';
    var offset = 28; // px away from edge midpoint

    function addLabel(x, y, angle, text, color, anchor) {
      var g = document.createElementNS(ns, 'g');
      g.setAttribute('class', 'axis-label');
      g.setAttribute('transform', 'translate('+x+','+y+') rotate('+angle+')');
      var t = document.createElementNS(ns, 'text');
      t.setAttribute('text-anchor', anchor || 'middle');
      t.setAttribute('dominant-baseline', 'middle');
      t.setAttribute('font-family', 'Inter, system-ui, sans-serif');
      t.setAttribute('font-size', '11');
      t.setAttribute('font-weight', '600');
      t.setAttribute('letter-spacing', '0.06em');
      t.setAttribute('fill', color);
      t.textContent = text;
      g.appendChild(t);
      svg.appendChild(g);
    }

    // Liberal: bottom edge (left→right = toward right = Liberal 100% is bottom-left corner)
    //   edge midpoint, label below, text runs left (← direction)
    var libMidX = (left + midX) / 2, libMidY = (bottom + bottom) / 2;
    // angle of left edge (top→bottom-left): atan2(bottom-top, left-midX)
    var leftEdgeAngle = Math.atan2(bottom - top, left - midX) * 180 / Math.PI;
    // Liberal: bottom-left corner, horizontal, below the edge
    addLabel(
      left,
      bottom + offset,
      0,
      '← 100% LIBERAL',
      '#D71920',
      'start'
    );

    // Conservative: near bottom-right corner, along right edge
    var rightEdgeAngle = Math.atan2(bottom - top, right - midX) * 180 / Math.PI;
    var rPerpX = Math.cos((rightEdgeAngle - 90) * Math.PI/180);
    var rPerpY = Math.sin((rightEdgeAngle - 90) * Math.PI/180);
    addLabel(
      right + rPerpX * offset + 10,
      bottom + rPerpY * offset,
      rightEdgeAngle,
      'CONSERVATIVE 100% →',
      '#1A4782',
      'end'
    );

    // Third-party: near top vertex, along left edge, reading upward
    var leftEdgeUp = leftEdgeAngle + 180;
    var lPerpX = Math.cos((leftEdgeAngle - 90) * Math.PI/180);
    var lPerpY = Math.sin((leftEdgeAngle - 90) * Math.PI/180);
    addLabel(
      midX - 60 + lPerpX * offset,
      top  - 20 + lPerpY * offset,
      leftEdgeUp,
      'THIRD-PARTY 100% →',
      '#555555',
      'end'
    );

    svg.style.opacity = '1';
  }
  window.addEventListener('load', function() { setTimeout(alignGradient, 200); });
})();
</script>

<script>
(function() {
  var partyColors = {
    'Liberal': '#D71920',
    'Conservative': '#1A4782',
    'NDP': '#F37021',
    'Bloc Québécois': '#33B2CC',
    'Green': '#3D9B35'
  };

  // Trace layout: 0-4 = lines, 5-9 = 2021 dots, 10-14 = 2025 dots (one per party in order)
  // parties = [Liberal, Conservative, NDP, Bloc, Green]
  var partyOrder = ['Liberal', 'Conservative', 'NDP-New Democratic Party', 'Bloc Québécois', 'Green Party'];
  var shortToFull = {
    'Liberal': 'Liberal', 'Conservative': 'Conservative',
    'NDP': 'NDP-New Democratic Party', 'Bloc Québécois': 'Bloc Québécois', 'Green': 'Green Party'
  };

  // pointIndex within a party trace for a given customdata row.
  // We find it by scanning the trace's customdata array for a matching riding name.
  function findPointIndex(gd, traceIdx, ridingName) {
    var cd = gd.data[traceIdx].customdata;
    if (!cd) return -1;
    for (var i = 0; i < cd.length; i++) {
      if (cd[i][0] === ridingName) return i;
    }
    return -1;
  }

  // Riding index for search (built once from 2025 dot traces 10-14)
  var allRidings = [];
  function buildRidingIndex(gd) {
    if (allRidings.length) return;
    for (var t = 10; t < 15; t++) {
      var cd = gd.data[t].customdata;
      if (!cd) continue;
      for (var i = 0; i < cd.length; i++) allRidings.push(cd[i]);
    }
    allRidings.sort(function(a, b) { return a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0; });
  }

  // Store original line trace a/b/c arrays so we can restore them
  var origLines = null;

  function ensureOrigLines(gd) {
    if (origLines) return;
    origLines = [];
    for (var i = 0; i < 5; i++) {
      origLines.push({
        a: gd.data[i].a.slice(),
        b: gd.data[i].b.slice(),
        c: gd.data[i].c.slice()
      });
    }
  }

  function dimToPoint(gd, ridingName, partyShort) {
    var fullParty = shortToFull[partyShort];
    var partyIdx = partyOrder.indexOf(fullParty);
    if (partyIdx === -1) return;

    ensureOrigLines(gd);

    var dot21Idx = 5 + partyIdx;
    var dot25Idx = 10 + partyIdx;
    var ptIdx = findPointIndex(gd, dot21Idx, ridingName);

    // Build segment arrays for active line trace
    var segA, segB, segC;
    if (ptIdx >= 0) {
      var segStart = ptIdx * 3;
      var orig = origLines[partyIdx];
      segA = orig.a.slice(segStart, segStart + 3);
      segB = orig.b.slice(segStart, segStart + 3);
      segC = orig.c.slice(segStart, segStart + 3);
    }

    // Single restyle call for all 15 traces at once
    var updates = { opacity: [], a: [], b: [], c: [], selectedpoints: [], 'unselected.marker.opacity': [] };
    var indices = [];

    for (var i = 0; i < 15; i++) {
      indices.push(i);
      if (i < 5) {
        // Line traces
        if (i === partyIdx && ptIdx >= 0) {
          updates.opacity.push(0.6);
          updates.a.push(segA);
          updates.b.push(segB);
          updates.c.push(segC);
        } else {
          updates.opacity.push(0.04);
          updates.a.push(gd.data[i].a);  // unchanged
          updates.b.push(gd.data[i].b);
          updates.c.push(gd.data[i].c);
        }
        updates.selectedpoints.push(null);
        updates['unselected.marker.opacity'].push(1);
      } else {
        // Dot traces
        var dpi = i % 5;
        updates.a.push(gd.data[i].a);
        updates.b.push(gd.data[i].b);
        updates.c.push(gd.data[i].c);
        var is2021trace = (i < 10);
        if (dpi === partyIdx) {
          var selIdx = findPointIndex(gd, i, ridingName);
          updates.opacity.push(is2021trace ? 0 : 1);
          updates.selectedpoints.push(selIdx >= 0 ? [selIdx] : []);
          updates['unselected.marker.opacity'].push(0.06);
        } else {
          updates.opacity.push(0.06);
          updates.selectedpoints.push(null);
          updates['unselected.marker.opacity'].push(1);
        }
      }
    }

    Plotly.restyle(gd, updates, indices);
  }

  function restoreAll(gd) {
    if (!origLines) return;
    var updates = { opacity: [], a: [], b: [], c: [], selectedpoints: [], 'unselected.marker.opacity': [] };
    var indices = [];
    for (var i = 0; i < 15; i++) {
      indices.push(i);
      if (i < 5) {
        updates.opacity.push(0.5);
        updates.a.push(origLines[i].a);
        updates.b.push(origLines[i].b);
        updates.c.push(origLines[i].c);
      } else {
        // 2021 dot traces (5-9) stay hidden; 2025 dot traces (10-14) restore to full
        updates.opacity.push(i < 10 ? 0 : 1);
        updates.a.push(gd.data[i].a);
        updates.b.push(gd.data[i].b);
        updates.c.push(gd.data[i].c);
      }
      updates.selectedpoints.push(null);
      updates['unselected.marker.opacity'].push(1);
    }
    Plotly.restyle(gd, updates, indices);
  }

  var locked = false;

  function fmt(v) { return (v * 100).toFixed(1) + '%'; }
  function fmtChg(v) { return (v >= 0 ? '+' : '') + (v * 100).toFixed(1) + 'pp'; }
  function chgClass(v) { return v > 0.001 ? 'pos' : v < -0.001 ? 'neg' : 'neu'; }

  function setBar(barId, pctId, val, color) {
    var pct = Math.min(Math.max(val * 100, 0), 100);
    document.getElementById(barId).style.width = pct + '%';
    document.getElementById(barId).style.background = color;
    document.getElementById(pctId).textContent = fmt(val);
  }
  function setChg(chgId, val) {
    var el = document.getElementById(chgId);
    el.textContent = fmtChg(val);
    el.className = 'detail-change-val ' + chgClass(val);
  }

  function showDetail(cd) {
    document.getElementById('dc-riding').textContent = cd[0];
    document.getElementById('dc-province').textContent = cd[1];
    var pill = document.getElementById('dc-pill');
    pill.textContent = cd[2];
    pill.style.background = partyColors[cd[2]] || '#888';
    setBar('bar-lib25', 'pct-lib25', cd[3], '#D71920');
    setBar('bar-con25', 'pct-con25', cd[4], '#1A4782');
    setBar('bar-tp25',  'pct-tp25',  cd[5], '#888888');
    setChg('chg-lib', cd[9]);
    setChg('chg-con', cd[10]);
    setChg('chg-tp',  cd[11]);
    document.getElementById('detail-card').className = 'filled';
  }

  function clearDetail() {
    document.getElementById('detail-card').className = 'empty';
  }

  function setLocked(val) {
    locked = val;
  }

  var hoveredCd = null;

  function attachHover() {
    var gd = document.querySelector('.plotly-graph-div');
    if (!gd || !gd._fullLayout) { setTimeout(attachHover, 150); return; }

    buildRidingIndex(gd);
    initSearch(gd);

    gd.on('plotly_hover', function(data) {
      var pt = data.points[0];
      if (pt && pt.customdata) {
        gd.classList.add('hovering-dot');
        hoveredCd = pt.customdata;
        if (!locked) {
          showDetail(hoveredCd);
          dimToPoint(gd, hoveredCd[0], hoveredCd[2]);
        }
      }
    });

    gd.on('plotly_unhover', function() {
      gd.classList.remove('hovering-dot');
      hoveredCd = null;
      if (!locked) {
        clearDetail();
        restoreAll(gd);
      }
    });

    gd.on('plotly_click', function(data) {
      var pt = data.points[0];
      if (pt && pt.customdata) {
        showDetail(pt.customdata);
        dimToPoint(gd, pt.customdata[0], pt.customdata[2]);
        setLocked(true);
      }
    });

    gd.addEventListener('click', function() {
      if (!locked) return;
      if (!hoveredCd) {
        setLocked(false);
        clearDetail();
        restoreAll(gd);
      }
    });
  }
  function initSearch(gd) {
    var input    = document.getElementById('search-input');
    var dropdown = document.getElementById('search-dropdown');
    var clearBtn = document.getElementById('search-clear');

    function openDropdown(items) {
      dropdown.innerHTML = '';
      items.forEach(function(cd) {
        var li = document.createElement('li');
        var dot = document.createElement('span');
        dot.className = 'search-dot';
        dot.style.background = partyColors[cd[2]] || '#888';
        li.appendChild(dot);
        li.appendChild(document.createTextNode(cd[0]));
        li.addEventListener('mousedown', function(e) {
          e.preventDefault();
          selectRiding(cd);
        });
        dropdown.appendChild(li);
      });
      dropdown.style.display = items.length ? 'block' : 'none';
    }

    function closeDropdown() {
      dropdown.style.display = 'none';
      dropdown.innerHTML = '';
    }

    function selectRiding(cd) {
      showDetail(cd);
      dimToPoint(gd, cd[0], cd[2]);
      setLocked(true);
      input.value = cd[0];
      clearBtn.style.display = 'block';
      closeDropdown();
      input.blur();
    }

    function clearSearch() {
      input.value = '';
      clearBtn.style.display = 'none';
      closeDropdown();
      setLocked(false);
      clearDetail();
      restoreAll(gd);
    }

    input.addEventListener('input', function() {
      var q = input.value.trim().toLowerCase();
      clearBtn.style.display = input.value ? 'block' : 'none';
      if (!q) {
        closeDropdown();
        if (locked) { setLocked(false); clearDetail(); restoreAll(gd); }
        return;
      }
      var matches = allRidings.filter(function(cd) {
        return cd[0].toLowerCase().indexOf(q) !== -1;
      });
      matches.sort(function(a, b) {
        var aS = a[0].toLowerCase().indexOf(q) === 0;
        var bS = b[0].toLowerCase().indexOf(q) === 0;
        return (aS && !bS) ? -1 : (!aS && bS) ? 1 : 0;
      });
      openDropdown(matches.slice(0, 50));
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { clearSearch(); return; }
      var items = dropdown.querySelectorAll('li');
      if (!items.length) return;
      var activeEl = dropdown.querySelector('li.active');
      var activeIdx = activeEl ? Array.prototype.indexOf.call(items, activeEl) : -1;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        var next = Math.min(activeIdx + 1, items.length - 1);
        if (activeEl) activeEl.classList.remove('active');
        items[next].classList.add('active');
        items[next].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        var prev = Math.max(activeIdx - 1, 0);
        if (activeEl) activeEl.classList.remove('active');
        items[prev].classList.add('active');
        items[prev].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter' && activeEl) {
        activeEl.dispatchEvent(new MouseEvent('mousedown'));
      }
    });

    input.addEventListener('blur', function() { setTimeout(closeDropdown, 150); });
    clearBtn.addEventListener('click', clearSearch);
  }

  window.addEventListener('load', function() { setTimeout(attachHover, 300); });
})();
</script>
  </div><!-- /chart-container -->
  </div><!-- /main-row -->
</div><!-- /page-wrapper -->
</body>
